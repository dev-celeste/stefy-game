<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>106.9 Presents: Stefan's Big Day</title>

  <style>
    /* ---- CSS: how things LOOK ---- */

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0810;
      font-family: "Courier New", monospace;
    }

    /* The game screen: internal 640x480, magnified with transform: scale().
       Vertical stack: art stage on top, textbox below. */
    #game {
      width: 640px;
      height: 480px;
      background: #141018;
      color: #f4f1e8;
      border: 4px solid #000;
      box-sizing: border-box;
      transform: scale(1.25);
      transform-origin: center;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;         /* anchor for the DDR overlay that fills the game */
    }

    /* THE DDR OVERLAY: a full-screen layer that covers the game during the
       minigame. Hidden by default; shown while the rhythm game runs. */
    #ddrWrap {
      position: absolute;
      inset: 0;
      display: none;              /* flipped to "block" when the minigame starts */
      background: #0b0a12;
    }

    #ddrCanvas {
      width: 100%;
      height: 100%;
      image-rendering: pixelated; /* crisp, blocky arrows */
    }

    /* THE ART STAGE: holds the background and character layers. */
    #stage {
      position: relative;
      height: 250px;
      width: 100%;
      image-rendering: pixelated;
    }

    #bg {
      position: absolute;
      inset: 0;
      background: #000;
    }

    #chars {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 24px;
      padding-bottom: 12px;
    }

    .char {
      width: 88px;
      height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 12px;
      color: #000;
      border: 2px solid rgba(0,0,0,0.45);
      image-rendering: pixelated;
    }

    /* A pixel-sprite character. The box is exactly the sprite's footprint
       (12*8 x 16*8). No border/background — it's just a frame for the dot. */
    .char.sprite {
      width: 96px;
      height: 128px;
      border: none;
      background: none;
      position: relative;
    }

    /* THE DOT: one 8x8 square anchored top-left. Its box-shadow (set in JS)
       clones it into every lit pixel of the sprite. Shadows don't affect
       layout, so the whole sprite "floats" out of this single tiny element. */
    .char.sprite .px {
      position: absolute;
      top: 0;
      left: 0;
      width: 8px;
      height: 8px;
      background: transparent;
    }

    /* THE TEXTBOX: the story text and choice buttons. */
    #textbox {
      flex: 1;
      padding: 18px 20px;
      overflow: auto;
    }

    /* THE 106.9 DJ NARRATOR: a radio caption that cuts in on the big beats.
       Hidden on scenes that carry no `dj` line. */
    #dj {
      display: none;              /* flipped to "block" only when a dj line exists */
      margin-bottom: 12px;
      padding: 8px 12px;
      background: #1c1230;
      border-left: 4px solid #d99a4e;   /* amber "radio" accent */
    }

    #dj .tag {
      display: block;
      font-size: 11px;
      letter-spacing: 1px;
      color: #8a74c0;
      margin-bottom: 3px;
    }

    #dj .line {
      font-size: 13px;
      line-height: 1.5;
      font-style: italic;
      color: #e7c98a;
    }

    #text {
      font-size: 17px;
      line-height: 1.6;
      min-height: 78px;
    }

    #choices {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .choice {
      font-family: inherit;
      font-size: 16px;
      text-align: left;
      padding: 10px 14px;
      background: #241c30;
      color: #f4f1e8;
      border: 2px solid #4a3d63;
      cursor: pointer;
    }

    .choice:hover {
      background: #3a2f4d;
      border-color: #8a74c0;
    }

    /* The "Play again" button shown on ending scenes — styled to stand apart. */
    .restart {
      background: #3a2416;
      border-color: #a6702f;
      text-align: center;
      font-weight: bold;
    }

    .restart:hover {
      background: #5a3820;
      border-color: #d99a4e;
    }

    /* THE MUTE TOGGLE: always visible, pinned to the top-right of the game. */
    #mute {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 5;                 /* sit above the art + DDR overlay */
      font-family: inherit;
      font-size: 12px;
      padding: 4px 8px;
      background: rgba(20,16,24,0.8);
      color: #f4f1e8;
      border: 2px solid #4a3d63;
      cursor: pointer;
    }

    #mute:hover {
      border-color: #8a74c0;
    }
  </style>
</head>

<body>

      <div id="bg"></div>

    </div>
    <div id="ddrWrap">
      <canvas id="ddrCanvas" width="640" height="480"></canvas>
    </div>
  </div>

  <script>
    /* ---- JavaScript: the BEHAVIOR ---- */

    // 0) ART PALETTES: names -> looks. Swap a color for an image URL later.
    const BG = {
      bedroom:      "#2a2140",  // dim purple morning light
      livingroom:   "#241f33",  // cozy apartment
      foulk_break:  "#20303a",  // break room fluorescents

    // PAL: single-letter codes -> the actual pixel colors. The sprite maps below

    // '.' means "transparent" (no pixel drawn), so the background shows through.
    const PAL = {
      s: "#e6be96", e: "#1e1923",                 // skin, eyes
      H: "#e8c86a", K: "#1a1a1e", k: "#282830",   // stefan: blonde, black shirt/shade
      B: "#78503a", p: "#c98fb0", j: "#3a3050",   // maria:  brown hair, pink shirt, jeans
      g: "#4a3a2a", G: "#8fb06a", o: "#3a4a2a",   // greg:   brown hair, green shirt, green pants
      c: "#c9873f", C: "#965a28", w: "#f0e1cd",   // penny:  orange, orange-shade, cream belly
      a: "#7de0a0", A: "#5ab478"                  // alien:  green, green-shade
    };

    // CHAR: each character keeps its old `color`/`label` (the fallback block) AND
    // now a `px` sprite map — a 12-wide x 16-tall ASCII grid drawn with the PAL
    // above. showArt uses the sprite if `px` exists, else the colored block.
    const CHAR = {
      stefan: { color: "#d9c27a", label: "STEFAN", px: [
        "...HHHHHH...","..HHHHHHHH..","..HssssssH..","..ssssssss..",
        "..sesssess..","...ssssss...","...KKKKKK...","..KKKKKKKK..",
        "s.KKKKKKKK.s","s.KKKKKKKK.s","..KKKKKKKK..","...KKKKKK...",
        "...KK..KK...","...KK..KK...","...kk..kk...","..kkk..kkk.."
      ]},
      penny:  { color: "#c9873f", label: "PENNY", px: [
        "............",".cc....cc...",".ccc..ccc...",".cccccccc...",
        ".cceccecc...",".cccccccc...",".ccCccCcc...","cccccccccc..",
        "cwwwwwwwwc..","cwwwwwwwwc..","cwwwwwwwwc..","ccwwwwwwcc..",
        "cc.cc.cc....",".cc.cc.cc...","........cCC.",".........cC."
      ]},
      maria:  { color: "#c98fb0", label: "MARIA", px: [
        "...BBBBBB...","..BBBBBBBB..","..BssssssB..","..ssssssss..",
        "..sesssess..","...ssssss...","...pppppp...","..pppppppp..",
        "s.pppppppp.s","s.pppppppp.s","..pppppppp..","...pppppp...",
        "...pp..pp...","...pp..pp...","...jj..jj...","..jjj..jjj.."
      ]},
      greg:   { color: "#8fb06a", label: "GREG", px: [   // salad-green, naturally
        "...gggggg...","..gggggggg..","..gssssssg..","..ssssssss..",
        "..sesssess..","...ssssss...","...GGGGGG...","..GGGGGGGG..",
        "s.GGGGGGGG.s","s.GGGGGGGG.s","..GGGGGGGG..","...GGGGGG...",
        "...GG..GG...","...GG..GG...","...oo..oo...","..ooo..ooo.."
      ]},
      alien:  { color: "#7de0a0", label: "???", px: [
        ".....aa.....","....a..a....",".....aa.....","...aaaaaa...",
        "..aaaaaaaa..","..aeeaaeea..","..aaaaaaaa..","...aAAAAa...",
        "...aaaaaa...","..aaaaaaaa..","s.aaaaaaaa.s","..aaaaaaaa..",
        "...aa..aa...","...aa..aa...","...AA..AA...","..AAA..AAA.."
      ]}
    };

    // 1) THE DATA: the whole story as scenes. Each scene names a bg, its chars,
    //    text, and choices ({label, next}). Endings set `ending: true` and carry
    //    no choices — the engine gives them a "Play again" button instead.
    const STORY = {

      /* ---------- PROLOGUE ---------- */
      start: {
        bg: "bedroom",
        chars: ["stefan"],
        music: "cozy",
        sting: "vineboom",
        dj: "You're locked in to 106.9 M&S — the only station brave enough to drop a vine boom at 7 a.m. Rise and grind, Wilmington!",
        text: "The alarm's been snoozed twice. On the shelf, Penny is pushing your coffee cup toward the edge in slow motion, staring dead at you. 106.9 M&S plays a vine boom from the kitchen.",
        choices: [
          { label: "Save the cup!",   next: "cup_save" },
          { label: "Let Penny win",   next: "cup_let"  }
        ]
      },
      cup_save: {
        bg: "bedroom",
        chars: ["stefan", "penny"],
        text: "You lunge and catch it — nice. Penny, unbothered, calmly shoves your headphones off the nightstand instead. From the kitchen, Maria laughs: 'He's evil!'",
        choices: [ { label: "Head to the living room", next: "morning_choice" } ]
      },
      cup_let: {
        bg: "bedroom",
        chars: ["stefan", "penny"],
        text: "You let it drop. Penny watches it shatter with deep satisfaction, then knocks your headphones off too, for good measure. Maria yells from the kitchen: 'What broke?!'",
        choices: [ { label: "Head to the living room", next: "morning_choice" } ]
      },
      morning_choice: {
        bg: "livingroom",
        chars: ["stefan", "maria"],
        dj: "Big fork-in-the-road energy this morning, folks. *airhorn* Whatever you pick — no wrong answers, only content!",
        text: "One Piece is paused on the TV, an Eagles pennant on the wall, your mic stand in the corner. Maria hands you coffee. Your work phone buzzes: FOULK needs you today. 106.9 drops an 'OHHH' sting, like it knows.",
        choices: [
          { label: "Yeah — I'm heading in to Foulk.",       next: "b1_clockin" },
          { label: "Nah... calling out. Let's have a day.",  next: "b2_hunt"    }
        ]
      },

      /* ---------- BRANCH 1: Invasion at Foulk ---------- */
      b1_clockin: {
        bg: "foulk_break",
        chars: ["stefan", "greg"],
        music: "tense",
        dj: "Shoutout to the maintenance heroes clocking in today. Somebody get Greg a bigger salad. *bruh sting*",
        text: "You clock in. Greg's in the break room, aggressively eating a salad. 'Yo! You're late. Eat yo salad before I toss yo salad.' But something's off — Mr. Abernathy's hearing aid is emitting a weird signal, and a resident is watching the microwave like it's TV.",
        choices: [
          { label: "Investigate the weirdness",         next: "b1_investigate" },
          { label: "Play it safe — grab your tools first", next: "b1_toolup"   }
        ]
      },
      b1_investigate: {
        bg: "foulk_rec",
        chars: ["stefan", "alien"],
        sting: "ohhh",
        dj: "*record scratch* Uhh, we're getting weird reports out of Foulk, folks. Do NOT adjust your dial. Stay tuned...",
        text: "In the rec room, the 'residents' drop the act — glowing eyes, shed disguises, a small craft where the bingo table used to be. Foulk's been a quiet alien hideout. Greg's already halfway to the door.",
        choices: [
          { label: "Try to talk them down",       next: "b1_talk"  },
          { label: "Grab a wrench and get ready",  next: "b1_fight" }
        ]
      },
      b1_toolup: {
        bg: "foulk_rec",
        chars: ["stefan", "greg"],
        text: "You and Greg barricade the rec-room doors and rig something from the maintenance closet — a maintenance man improvises. Through the window, more of them drift the halls, scanning with pale light.",
        choices: [
          { label: "Rig a 'sound cannon' from the PA + your mic", next: "end_1A" },
          { label: "Sneak the real residents out and hide",       next: "end_1D" }
        ]
      },
      b1_talk: {
        bg: "foulk_rec",
        chars: ["stefan", "alien"],
        text: "You raise your hands. 'Okay — nobody's tossing anybody's salad. Talk to me.' The nearest alien tilts its head, curious. It's listening.",
        choices: [
          { label: "Belt out a song to connect",              next: "end_1C" },
          { label: "It's not working — patch the PA and SCREAM", next: "end_1A" }
        ]
      },
      b1_fight: {
        bg: "foulk_rec",
        chars: ["stefan", "greg", "alien"],
        text: "Greg hefts a pipe wrench. 'Two-player mode?' Your gamer brain lights up — you can read their patterns like a boss fight.",
        choices: [
          { label: "Call the combos — 'left! roll! now!'", next: "end_1B" },
          { label: "Too many — fall back to the closet",   next: "end_1D" }
        ]
      },

      /* Branch 1 endings */
      end_1A: {
        bg: "foulk_invaded",
        chars: ["stefan"],
        ending: true,
        music: "win",
        sting: "ohhh",
        dj: "*OHHH sting* FOLKS. That scream just lit up every phone line in the building. Absolutely legendary.",
        text: "ENDING 1A — 'Visions (Live at Foulk).' You cue Visions and unleash a scream so pure it overloads their tech. Windows rattle, systems fry, they retreat. Greg, tearing up: 'Bro... that was the best set you've ever done.'",
        choices: []
      },
      end_1B: {
        bg: "foulk_invaded",
        chars: ["stefan", "greg"],
        ending: true,
        music: "win",
        sting: "stinger",
        dj: "Two-player mode for the WIN! That's a co-op dub, baby. Greg, the salad's on us today.",
        text: "ENDING 1B — 'Co-op Mode.' You call combos on pure instinct, Greg swings the wrench. Teamwork wins. Fist-bump over the wreckage. Greg: 'NOW that's how you toss a salad.'",
        choices: []
      },
      end_1C: {
        bg: "foulk_rec",
        chars: ["stefan", "alien"],
        ending: true,
        music: "win",
        dj: "Heartwarming update out of Foulk — turns out they just wanted to retire in peace. 106.9 approves this wholesome content.",
        text: "ENDING 1C — 'They Just Wanted to Retire.' They weren't invading — they picked Foulk to live out their days in peace, and got spooked. Your kindness (and a mic-drop song) wins them over. They stay on as the home's most interesting residents. It's you and Greg's secret.",
        choices: []
      },
      end_1D: {
        bg: "foulk_break",
        chars: ["stefan", "greg"],
        ending: true,
        music: "soft",
        dj: "Sometimes just making it home IS the highlight reel. We respect the survivors. Go get that Nanu's, king.",
        text: "ENDING 1D — 'Lived to Tell It.' You and Greg hunker in the supply closet with the real residents, eating cold pizza until it quiets down. You never learn what happened. You clock out shaken and order Nanu's Chicken. Best worst day ever.",
        choices: []
      },

      /* ---------- BRANCH 2: The 106.9 Live Contest ---------- */
      b2_hunt: {
        bg: "livingroom",
        chars: ["stefan", "maria"],
        music: "hunt",
        sting: "airhorn",
        dj: "*AIRHORN* THE 106.9 M&S RIDDLE HUNT STARTS NOW! Grand prize: YOUR band opens for AUGUST BURNS RED. Let's! Go!",
        text: "You call out. Maria's thrilled. You settle in for an Attack on Titan marathon, 106.9 M&S humming in the background. Then the DJ cuts in, LIVE, over an airhorn: 'The 106.9 RIDDLE HUNT starts NOW! First to crack our clues across Wilmington wins the GRAND PRIZE — YOUR band opens for AUGUST BURNS RED!'",
        choices: [ { label: "Wait. Scarpenters. That's winnable.", next: "b2_riddle" } ]
      },
      b2_riddle: {
        bg: "livingroom",
        chars: ["stefan", "maria"],
        dj: "Clue number one, coming in HOT. Decode it, race for it, win it. No pressure. (Okay, a little pressure.)",
        text: "The first clue drops: 'Where the keyblade bearer would seek a door, and a straw-hat crew would restock their store.' Penny's ears perk up. Maria grabs a notepad.",
        choices: [
          { label: "Crack it with gamer instinct (the Kingdom Hearts read)", next: "b2_ddr_solo" },
          { label: "Crack it with anime brain (the One Piece read)",         next: "b2_ddr_team" }
        ]
      },
      b2_ddr_solo: {
        bg: "barcade",
        chars: ["stefan"],
        music: "arcade",
        dj: "Ohhh it's a DDR machine?? Listeners, show us those legendary thumbs. Arrow keys, don't fail us now!",
        text: "The clue leads to a barcade — and a DDR machine holding the next clue. You crack your knuckles. Hit each arrow with the matching arrow key as it reaches the line.",
        choices: [
          { label: "Step on the pad — go for a flawless run", minigame: { chart: "hard", clear: "end_2A", fail: "end_2C" } },
          { label: "Let Penny take the pad instead",          next: "end_2D" }
        ]
      },
      b2_ddr_team: {
        bg: "barcade",
        chars: ["stefan", "maria"],
        music: "arcade",
        dj: "Couples DDR?? 106.9 is OFFICIALLY rooting for you two. Hit those arrows in sync, lovebirds!",
        text: "Same barcade, same DDR machine. Maria bumps your shoulder: 'Co-op?' Hit each arrow with the matching arrow key as it reaches the line.",
        choices: [
          { label: "Co-op the dance with Maria",            minigame: { chart: "easy", clear: "end_2B", fail: "end_2C" } },
          { label: "Detour to Nanu's first, wing it later", next: "end_2C" }
        ]
      },

      /* Branch 2 endings */
      end_2A: {
        bg: "stage",
        chars: ["stefan"],
        ending: true,
        music: "win",
        sting: "stinger",
        dj: "*AIRHORN x3* WE HAVE A CHAMPION! Scarpenters, you're opening for AUGUST BURNS RED. History, live on 106.9!",
        text: "ENDING 2A — 'Champions of 106.9.' A flawless run wins it, solo-hero style. Weeks later, Scarpenters is on stage opening for August Burns Red — Maria front row, you screaming Burdened by Weight to a real crowd.",
        choices: []
      },
      end_2B: {
        bg: "stage",
        chars: ["stefan", "maria"],
        ending: true,
        music: "win",
        sting: "stinger",
        dj: "A TEAM victory! Two people who met on a music app, now on stage together. We're not crying, YOU'RE crying.",
        text: "ENDING 2B — 'Two of Us.' You leaned on Maria's smarts and won as a team — a callback to how you met on the music app. Scarpenters gets the gig, together.",
        choices: []
      },
      end_2C: {
        bg: "nanus",
        chars: ["stefan", "maria"],
        ending: true,
        music: "soft",
        dj: "Second place, but FIRST in our hearts. Also — Nanu's Chicken? Elite choice. No notes. *chef's kiss sting*",
        text: "ENDING 2C — 'Second Place, Best Day.' You chased the funniest option all day — Nanu's Chicken, chaos, detours — and lost the prize by a hair. Worth it. Perfect day off.",
        choices: []
      },
      end_2D: {
        bg: "barcade",
        chars: ["stefan", "penny"],
        ending: true,
        music: "soft",
        sting: "airhorn",
        dj: "BREAKING: 106.9's new station mascot is... a CAT. Penny, the booth is yours. This is the timeline we deserve.",
        text: "ENDING 2D — 'Penny Goes Viral.' Penny's dance-pad stunt blows up so hard that 106.9 crowns THE CAT the winner and makes him station mascot. Scarpenters still gets the gig — per Penny's 'management.'",
        choices: []
      }
    };

    // 2) THE LOGIC: grab the areas we'll be updating, once.
    const gameEl    = document.getElementById("game");
    const bgEl      = document.getElementById("bg");
    const charsEl   = document.getElementById("chars");
    const textEl    = document.getElementById("text");
    const choicesEl = document.getElementById("choices");
    const djEl      = document.getElementById("dj");

    // Typewriter state:
    let typeTimer     = null;
    let isTyping      = false;
    let currentText   = "";
    let currentOnDone = null;

    // 3) DRAW THE ART: paint the background and lay out the characters.
    //    Each character is a pixel sprite if it has a `px` map, else the old block.

    // PX: how big one sprite pixel is, in screen pixels. A 12x16 map becomes a
    // 96x128 sprite at PX=8. Bump this to zoom the whole cast up or down.
    const PX = 8;

    // spriteShadow: turn an ASCII pixel grid into ONE giant box-shadow string.
    // The trick: a single 8x8 dot element, then one shadow per lit pixel that
    // clones that dot to (x, y). Transparent cells ('.') are simply skipped.
    function spriteShadow(grid) {
      const parts = [];
      for (let y = 0; y < grid.length; y++) {
        for (let x = 0; x < grid[y].length; x++) {
          const color = PAL[grid[y][x]];        // undefined for '.', so skipped
          if (color) parts.push((x * PX) + "px " + (y * PX) + "px 0 0 " + color);
        }
      }
      return parts.join(",");
    }

    function showArt(scene) {
      bgEl.style.background = BG[scene.bg];
      charsEl.innerHTML = "";
      scene.chars.forEach(function (name) {
        const info = CHAR[name];
        if (info.px) {                            // real sprite -> box-shadow art
          const wrap = document.createElement("div");
          wrap.className = "char sprite";
          const dot = document.createElement("div");
          dot.className = "px";
          dot.style.boxShadow = spriteShadow(info.px);
          wrap.appendChild(dot);
          charsEl.appendChild(wrap);
        } else {                                  // no sprite -> old colored block
          const block = document.createElement("div");
          block.className = "char";
          block.style.background = info.color;
          block.textContent = info.label;
          charsEl.appendChild(block);
        }
      });
    }

    // 3b) THE DJ NARRATOR: if this scene carries a `dj` line, show it as a 106.9
    //     radio caption above the story text; otherwise hide the banner.
    function showDJ(scene) {
      if (scene.dj) {
        // static chrome via innerHTML, but the DJ's words go in via textContent
        // (safe — the line is treated as text, never as HTML).
        djEl.innerHTML =
          '<span class="tag">\u25CF ON AIR \u2014 106.9 M&S</span>' +
          '<span class="line"></span>';
        djEl.querySelector(".line").textContent = scene.dj;
        djEl.style.display = "block";
      } else {
        djEl.style.display = "none";
      }
    }

    // 4) THE TYPEWRITER.
    function typeText(text, onDone) {
      clearInterval(typeTimer);
      textEl.textContent = "";
      currentText   = text;
      currentOnDone = onDone;
      isTyping      = true;
      let i = 0;
      typeTimer = setInterval(function () {
        textEl.textContent += text[i];
        i++;
        if (i >= text.length) {
          finishTyping();
        }
      }, 28);
    }

    // 5) SKIP / FINISH.
    function finishTyping() {
      if (!isTyping) return;
      clearInterval(typeTimer);
      textEl.textContent = currentText;
      isTyping = false;
      currentOnDone();
    }

    // 6) BUILD THE BUTTONS. Regular choices, plus a "Play again" button on endings.
    function showChoices(scene) {
      choicesEl.innerHTML = "";

      scene.choices.forEach(function (choice) {
        const btn = document.createElement("button");
        btn.className   = "choice";
        btn.textContent = choice.label;
        btn.addEventListener("click", function (ev) {
          ev.stopPropagation();
          sfx("confirm");                 // little blip so a choice feels clicky
          if (choice.minigame) {          // this choice launches the DDR minigame...
            startDDR(choice.minigame);    // ...which routes to clear/fail when done
          } else {
            showScene(choice.next);       // ...otherwise just move to the next scene
          }
        });
        choicesEl.appendChild(btn);
      });

      if (scene.ending) {                       // reached an ending?
        const again = document.createElement("button");
        again.className   = "choice restart";
        again.textContent = "\u21BB  Play again";
        again.addEventListener("click", function (ev) {
          ev.stopPropagation();
          showScene("start");                   // jump back to the very beginning
        });
        choicesEl.appendChild(again);
      }
    }

    // 7) THE ENGINE: draw art, type text, then reveal choices.
    function showScene(id) {
      const scene = STORY[id];
      showArt(scene);
      showDJ(scene);
      setMusic(scene.music);        // switch mood music if this scene names one
      if (scene.sting) sfx(scene.sting);   // play a one-shot meme sting if any
      choicesEl.innerHTML = "";
      typeText(scene.text, function () {
        showChoices(scene);
      });
    }

    // 8) CLICK-TO-SKIP.  (Also the first click unlocks audio — see initAudio.)
    gameEl.addEventListener("click", function () {
      initAudio();
      if (isTyping) finishTyping();
    });

    /* ================= DDR MINIGAME ================= */

    // Four lanes, in screen order left -> right. Each lane has a screen x, an
    // arrow glyph, a color, and the keys that trigger it.
    const LANES     = ["left", "down", "up", "right"];
    const LANE_X    = { left: 110, down: 250, up: 390, right: 530 };
    const GLYPH     = { left: "\u25C0", down: "\u25BC", up: "\u25B2", right: "\u25B6" };
    const LANE_COL  = { left: "#c98fb0", down: "#8fb06a", up: "#7dc0e0", right: "#d9a24e" };
    const TARGET_Y  = 96;   // the line where arrows should be hit

    // Map keyboard keys -> lane. Arrow keys, plus WASD as a backup.
    const KEY_LANE = {
      ArrowLeft: "left", ArrowDown: "down", ArrowUp: "up", ArrowRight: "right",
      a: "left", s: "down", w: "up", d: "right"
    };

    // Build a note list from a lane pattern: note i happens at start + i*gap ms.
    function makeNotes(pattern, gap, start) {
      return pattern.map(function (lane, i) {
        return { time: start + i * gap, lane: lane };
      });
    }

    // Two charts. `speed` = pixels travelled per millisecond (higher = faster/
    // harder). `perfect`/`good` = timing windows in ms. `clearPct` = fraction of
    // notes you must hit to clear the song.
    const CHARTS = {
      hard: {
        speed: 0.45, perfect: 55, good: 120, clearPct: 0.55,
        notes: makeNotes(
          ["left","down","up","right","up","down","left","right",
           "down","up","right","left","up","up","down","down",
           "left","right","left","right","down","up","left","right"],
          360, 1400)
      },
      easy: {
        speed: 0.30, perfect: 75, good: 165, clearPct: 0.50,
        notes: makeNotes(
          ["down","up","left","right","up","down","left",
           "right","up","down","left","right","down","up"],
          620, 1600)
      }
    };

    const ddrWrap = document.getElementById("ddrWrap");
    const ddrCtx  = document.getElementById("ddrCanvas").getContext("2d");

    let ddr = null;  // holds all state for the active game (null when not playing)

    // START: set up fresh game state, show the overlay, listen for keys, and
    // begin the animation loop.
    function startDDR(cfg) {
      const chart = CHARTS[cfg.chart];
      ddr = {
        cfg: cfg,
        chart: chart,
        // copy each note and add hit/missed flags so we don't mutate the chart
        notes: chart.notes.map(function (n) {
          return { time: n.time, lane: n.lane, hit: false, missed: false };
        }),
        startT: performance.now(),
        score: 0, combo: 0, hits: 0,
        flash: {},          // per-lane timestamp of the last keypress (for glow)
        lastJudge: ""       // "PERFECT" / "GOOD" / "MISS" text to show
      };
      ddrWrap.style.display = "block";
      window.addEventListener("keydown", ddrKey);
      requestAnimationFrame(ddrLoop);
    }

    // KEY: the player pressed a key. Find the closest still-open note in that
    // lane and judge how close the timing was.
    function ddrKey(e) {
      if (!ddr) return;
      const lane = KEY_LANE[e.key] || KEY_LANE[e.key.toLowerCase()];
      if (!lane) return;
      e.preventDefault();                       // stop arrow keys from scrolling

      const t = performance.now() - ddr.startT; // ms since the song started
      ddr.flash[lane] = t;                       // light up this lane's target

      // find the nearest un-judged note in this lane
      let best = null, bestDiff = Infinity;
      ddr.notes.forEach(function (n) {
        if (n.lane !== lane || n.hit || n.missed) return;
        const diff = Math.abs(n.time - t);
        if (diff < bestDiff) { bestDiff = diff; best = n; }
      });

      if (best && bestDiff <= ddr.chart.good) {  // close enough to count as a hit
        best.hit = true;
        ddr.hits++;
        ddr.combo++;
        sfx("hit");
        if (bestDiff <= ddr.chart.perfect) { ddr.score += 100; ddr.lastJudge = "PERFECT"; }
        else                               { ddr.score += 50;  ddr.lastJudge = "GOOD"; }
      } else {                                   // pressed with no note near = whiff
        ddr.combo = 0;
        ddr.lastJudge = "MISS";
        sfx("whiff");
      }
    }

    // LOOP: runs ~60x/second. Retire notes that slid past the window as misses,
    // redraw everything, and end the song once the last note is well past.
    function ddrLoop() {
      if (!ddr) return;
      const t = performance.now() - ddr.startT;

      ddr.notes.forEach(function (n) {
        if (!n.hit && !n.missed && t - n.time > ddr.chart.good) {
          n.missed = true;
          ddr.combo = 0;
          ddr.lastJudge = "MISS";
        }
      });

      drawDDR(t);

      const lastTime = ddr.chart.notes[ddr.chart.notes.length - 1].time;
      if (t > lastTime + 900) { endDDR(); return; }
      requestAnimationFrame(ddrLoop);
    }

    // DRAW: paint one frame — title, the four lane targets, the moving arrows,
    // and the HUD (score / combo / hits / last judgment).
    function drawDDR(t) {
      const c = ddrCtx;
      c.fillStyle = "#0b0a12";
      c.fillRect(0, 0, 640, 480);

      c.textAlign = "center";
      c.fillStyle = "#8a74c0";
      c.font = "16px 'Courier New', monospace";
      c.fillText("106.9 DDR  \u2014  hit the arrows on the line!", 320, 34);
      c.fillStyle = "#6a5d83";
      c.font = "13px 'Courier New', monospace";
      c.fillText("use the ARROW KEYS", 320, 56);

      // lane targets (the ring where arrows should land)
      LANES.forEach(function (lane) {
        const x = LANE_X[lane];
        const lit = ddr.flash[lane] && (t - ddr.flash[lane] < 110);
        c.fillStyle = lit ? "#d99a4e" : "#1b1626";
        c.fillRect(x - 42, TARGET_Y - 42, 84, 84);
        c.strokeStyle = "#4a3d63";
        c.lineWidth = 3;
        c.strokeRect(x - 42, TARGET_Y - 42, 84, 84);
        c.fillStyle = "#5a4d73";
        c.font = "38px monospace";
        c.fillText(GLYPH[lane], x, TARGET_Y + 13);
      });

      // moving arrows: an arrow reaches TARGET_Y exactly at its note time
      c.font = "38px monospace";
      ddr.notes.forEach(function (n) {
        if (n.hit) return;
        const x = LANE_X[n.lane];
        const y = TARGET_Y + (n.time - t) * ddr.chart.speed;
        if (y < -50 || y > 520) return;         // off-screen, skip
        c.fillStyle = n.missed ? "#5a3340" : LANE_COL[n.lane];
        c.fillText(GLYPH[n.lane], x, y + 13);
      });

      // HUD
      c.fillStyle = "#f4f1e8";
      c.font = "18px 'Courier New', monospace";
      c.textAlign = "left";
      c.fillText("Score " + ddr.score, 22, 452);
      c.textAlign = "center";
      c.fillText("Combo " + ddr.combo, 320, 452);
      c.textAlign = "right";
      c.fillText(ddr.hits + "/" + ddr.notes.length, 618, 452);

      if (ddr.lastJudge) {
        c.textAlign = "center";
        c.font = "22px 'Courier New', monospace";
        c.fillStyle = ddr.lastJudge === "PERFECT" ? "#7de0a0"
                    : ddr.lastJudge === "GOOD"    ? "#d9c27a"
                    : "#c96a6a";
        c.fillText(ddr.lastJudge, 320, TARGET_Y + 92);
      }
    }

    // END: stop the game, decide clear vs. fail by hit percentage, and route to
    // the matching ending scene.
    function endDDR() {
      window.removeEventListener("keydown", ddrKey);
      ddrWrap.style.display = "none";
      const pct = ddr.hits / ddr.notes.length;
      const cleared = pct >= ddr.chart.clearPct;
      const dest = cleared ? ddr.cfg.clear : ddr.cfg.fail;
      ddr = null;
      showScene(dest);
    }

    /* ================= SOUND ================= */
    // Everything is SYNTHESIZED with the Web Audio API — no audio files. That
    // keeps the game a single self-contained HTML file you can email or USB.

    let actx      = null;   // the AudioContext — the "sound card." null until unlocked.
    let master    = null;   // master volume (the mute switch lives here)
    let musicGain = null;   // separate volume for the background music (kept quieter)
    let muted     = false;
    let musicTimer  = null; // setTimeout handle that loops the current track
    let currentTrack = null;// name of the track that should be playing

    // Note name -> frequency (Hz). Just the handful of notes our little tunes use.
    const NOTE = {
      A2:110, C3:131, D3:147, E3:165, G3:196, A3:220, B3:247,
      C4:262, D4:294, E4:330, F4:349, G4:392, A4:440, B4:494,
      C5:523, D5:587, E5:659, G5:784, R:0   // R = rest (silence)
    };

    // Helper: turn "C4:2 E4:2 G4:4" style shorthand into [{f, d}] steps.
    // d is in eighth-notes; we scale to seconds when we play.
    function seq(str) {
      return str.trim().split(/\s+/).map(function (tok) {
        const parts = tok.split(":");
        return { f: NOTE[parts[0]], d: Number(parts[1]) };
      });
    }

    // TRACKS: short chiptune loops, one per mood. They just repeat.
    const TRACKS = {
      cozy:   seq("C4:2 E4:2 G4:2 E4:2 A4:2 G4:2 E4:2 D4:2"),           // prologue, warm
      tense:  seq("A2:2 A2:1 C3:1 A2:2 D3:2 A2:2 G3:1 A2:1 A2:4"),       // Foulk, uneasy
      hunt:   seq("C4:1 D4:1 E4:1 G4:1 E4:1 G4:1 A4:2 G4:1 E4:1 D4:2"),  // Branch 2, upbeat
      arcade: seq("E4:1 E4:1 G4:1 A4:1 B4:1 A4:1 G4:1 E4:1"),            // DDR barcade, driving
      win:    seq("C4:1 E4:1 G4:1 C5:2 G4:1 C5:1 E5:3 R:1"),             // triumphant endings
      soft:   seq("A3:3 G3:1 E3:4 D3:3 C3:5")                            // gentle endings
    };

    const EIGHTH = 0.16;   // seconds per eighth-note (tempo)

    // Create the AudioContext on the FIRST user gesture. Browsers block audio
    // until the user interacts, so we can't start sound before then.
    function initAudio() {
      if (actx) return;                       // already unlocked
      const AC = window.AudioContext || window.webkitAudioContext;
      actx = new AC();
      master = actx.createGain();
      master.gain.value = muted ? 0 : 0.6;
      master.connect(actx.destination);
      musicGain = actx.createGain();
      musicGain.gain.value = 0.18;            // music sits under the SFX
      musicGain.connect(master);
      if (currentTrack) playTrack(currentTrack);  // start whatever mood we're in
    }

    // TONE: play a single note. An oscillator makes the pitch; a gain node
    // shapes its volume over time (quick attack, smooth fade) so it doesn't click.
    function tone(freq, dur, type, when, dest, peak) {
      if (!freq) return;                      // a rest: play nothing
      const o = actx.createOscillator();
      const g = actx.createGain();
      o.type = type;
      o.frequency.value = freq;
      o.connect(g);
      g.connect(dest || master);
      g.gain.setValueAtTime(0.0001, when);
      g.gain.linearRampToValueAtTime(peak, when + 0.01);          // attack
      g.gain.exponentialRampToValueAtTime(0.0001, when + dur);    // decay
      o.start(when);
      o.stop(when + dur + 0.02);
    }

    // PLAY TRACK: schedule every note of the loop on the audio clock, then set a
    // timer to schedule the loop again when it finishes. currentTrack guards it
    // so a mood change stops the old loop from rescheduling itself.
    function playTrack(name) {
      const track = TRACKS[name];
      let when = actx.currentTime + 0.05;
      let total = 0;
      track.forEach(function (step) {
        const dur = step.d * EIGHTH;
        tone(step.f, dur * 0.9, "square", when, musicGain, 0.22);
        when  += dur;
        total += dur;
      });
      musicTimer = setTimeout(function () {
        if (currentTrack === name && actx) playTrack(name);
      }, total * 1000);
    }

    // SET MUSIC: switch moods. Does nothing if we're already on that track, so
    // scenes that share a mood don't restart the song.
    function setMusic(name) {
      if (!name || name === currentTrack) return;
      currentTrack = name;
      clearTimeout(musicTimer);
      if (actx) playTrack(name);
    }

    // SFX: short synthesized sound effects and 106.9 meme stings, triggered at
    // big beats via an optional `sting` field on a scene (or on choice clicks).
    function sfx(name) {
      if (!actx) return;
      const t = actx.currentTime;
      if (name === "confirm") {                       // clicking a choice
        tone(660, 0.08, "square", t,        master, 0.3);
        tone(880, 0.09, "square", t + 0.06, master, 0.3);
      } else if (name === "hit") {                     // a good DDR arrow
        tone(880, 0.06, "square", t, master, 0.25);
      } else if (name === "whiff") {                   // a missed DDR arrow
        tone(120, 0.12, "sawtooth", t, master, 0.2);
      } else if (name === "vineboom") {                // deep meme "boom"
        tone(70, 0.5, "sine", t, master, 0.5);
      } else if (name === "airhorn") {                 // hype sting
        [0, 0.14, 0.28].forEach(function (off) {
          tone(233, 0.13, "sawtooth", t + off,        master, 0.28);
          tone(311, 0.13, "sawtooth", t + off + 0.005, master, 0.28);
        });
      } else if (name === "ohhh") {                    // crowd "OHHH" swell
        tone(196, 0.4, "triangle", t, master, 0.3);
        tone(294, 0.4, "triangle", t + 0.04, master, 0.28);
      } else if (name === "stinger") {                 // triumphant arpeggio
        [523, 659, 784, 1047].forEach(function (f, i) {
          tone(f, 0.18, "square", t + i * 0.07, master, 0.3);
        });
      }
    }

    // THE MUTE TOGGLE: flip master volume and update the label. Also unlocks
    // audio, so clicking it is enough to turn sound on from a silent start.
    const muteBtn = document.getElementById("mute");
    muteBtn.addEventListener("click", function (ev) {
      ev.stopPropagation();                    // don't let it trigger click-to-skip
      initAudio();
      muted = !muted;
      master.gain.value = muted ? 0 : 0.6;
      muteBtn.innerHTML = muted ? "\u266A off" : "\u266A on";
    });

    /* ================================================ */

    // 9) KICK IT OFF.
    showScene("start");
  </script>
</body>
</html>
