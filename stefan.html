<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>106.9 Presents: Stefan's Big Day</title>

  <style>
    /* ---- CSS: how things LOOK ---- */

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0810;
      font-family: "Courier New", monospace;
    }

    /* The game screen: internal 640x480, magnified with transform: scale().
       Vertical stack: art stage on top, textbox below. */
    #game {
      width: 640px;
      height: 480px;
      background: #141018;
      color: #f4f1e8;
      border: 4px solid #000;
      box-sizing: border-box;
      transform: scale(1.25);
      transform-origin: center;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;         /* anchor for the DDR overlay that fills the game */
    }

    /* THE DDR OVERLAY: a full-screen layer that covers the game during the
       minigame. Hidden by default; shown while the rhythm game runs. */
    #ddrWrap {
      position: absolute;
      inset: 0;
      display: none;              /* flipped to "block" when the minigame starts */
      background: #0b0a12;
    }

    #ddrCanvas {
      width: 100%;
      height: 100%;
      image-rendering: pixelated; /* crisp, blocky arrows */
    }

    /* THE ART STAGE: holds the background and character layers. */
    #stage {
      position: relative;
      height: 250px;
      width: 100%;
      image-rendering: pixelated;
    }

    #bg {
      position: absolute;
      inset: 0;
      background: #000;
    }

    #chars {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 24px;
      padding-bottom: 12px;
    }

    .char {
      width: 88px;
      height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 12px;
      color: #000;
      border: 2px solid rgba(0,0,0,0.45);
      image-rendering: pixelated;
    }

    /* THE TEXTBOX: the story text and choice buttons. */
    #textbox {
      flex: 1;
      padding: 18px 20px;
      overflow: auto;
    }

    #text {
      font-size: 17px;
      line-height: 1.6;
      min-height: 78px;
    }

    #choices {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .choice {
      font-family: inherit;
      font-size: 16px;
      text-align: left;
      padding: 10px 14px;
      background: #241c30;
      color: #f4f1e8;
      border: 2px solid #4a3d63;
      cursor: pointer;
    }

    .choice:hover {
      background: #3a2f4d;
      border-color: #8a74c0;
    }

    /* The "Play again" button shown on ending scenes — styled to stand apart. */
    .restart {
      background: #3a2416;
      border-color: #a6702f;
      text-align: center;
      font-weight: bold;
    }

    .restart:hover {
      background: #5a3820;
      border-color: #d99a4e;
    }
  </style>
</head>

<body>
  <!-- ---- HTML: the STRUCTURE ---- -->
  <div id="game">
    <div id="stage">
      <div id="bg"></div>
      <div id="chars"></div>
    </div>
    <div id="textbox">
      <p id="text"></p>
      <div id="choices"></div>
    </div>
    <div id="ddrWrap">
      <canvas id="ddrCanvas" width="640" height="480"></canvas>
    </div>
  </div>

  <script>
    /* ---- JavaScript: the BEHAVIOR ---- */

    // 0) ART PALETTES: names -> looks. Swap a color for an image URL later.
    const BG = {
      bedroom:      "#2a2140",  // dim purple morning light
      livingroom:   "#241f33",  // cozy apartment
      foulk_break:  "#20303a",  // break room fluorescents
      foulk_rec:    "#2a2233",  // rec room, something's off
      foulk_invaded:"#12212b",  // the invasion state (cold, alien)
      barcade:      "#14121f",  // neon-dark barcade
      nanus:        "#3a2410",  // warm Nanu's Chicken glow
      stage:        "#0d0d16"   // concert stage
    };

    const CHAR = {
      stefan: { color: "#d9c27a", label: "STEFAN" },
      penny:  { color: "#c9873f", label: "PENNY"  },
      maria:  { color: "#c98fb0", label: "MARIA"  },
      greg:   { color: "#8fb06a", label: "GREG"   },  // salad-green, naturally
      alien:  { color: "#7de0a0", label: "???"    }
    };

    // 1) THE DATA: the whole story as scenes. Each scene names a bg, its chars,
    //    text, and choices ({label, next}). Endings set `ending: true` and carry
    //    no choices — the engine gives them a "Play again" button instead.
    const STORY = {

      /* ---------- PROLOGUE ---------- */
      start: {
        bg: "bedroom",
        chars: ["stefan"],
        text: "The alarm's been snoozed twice. On the shelf, Penny is pushing your coffee cup toward the edge in slow motion, staring dead at you. 106.9 M&S plays a vine boom from the kitchen.",
        choices: [
          { label: "Save the cup!",   next: "cup_save" },
          { label: "Let Penny win",   next: "cup_let"  }
        ]
      },
      cup_save: {
        bg: "bedroom",
        chars: ["stefan", "penny"],
        text: "You lunge and catch it — nice. Penny, unbothered, calmly shoves your headphones off the nightstand instead. From the kitchen, Maria laughs: 'He's evil!'",
        choices: [ { label: "Head to the living room", next: "morning_choice" } ]
      },
      cup_let: {
        bg: "bedroom",
        chars: ["stefan", "penny"],
        text: "You let it drop. Penny watches it shatter with deep satisfaction, then knocks your headphones off too, for good measure. Maria yells from the kitchen: 'What broke?!'",
        choices: [ { label: "Head to the living room", next: "morning_choice" } ]
      },
      morning_choice: {
        bg: "livingroom",
        chars: ["stefan", "maria"],
        text: "One Piece is paused on the TV, an Eagles pennant on the wall, your mic stand in the corner. Maria hands you coffee. Your work phone buzzes: FOULK needs you today. 106.9 drops an 'OHHH' sting, like it knows.",
        choices: [
          { label: "Yeah — I'm heading in to Foulk.",       next: "b1_clockin" },
          { label: "Nah... calling out. Let's have a day.",  next: "b2_hunt"    }
        ]
      },

      /* ---------- BRANCH 1: Invasion at Foulk ---------- */
      b1_clockin: {
        bg: "foulk_break",
        chars: ["stefan", "greg"],
        text: "You clock in. Greg's in the break room, aggressively eating a salad. 'Yo! You're late. Eat yo salad before I toss yo salad.' But something's off — Mr. Abernathy's hearing aid is emitting a weird signal, and a resident is watching the microwave like it's TV.",
        choices: [
          { label: "Investigate the weirdness",         next: "b1_investigate" },
          { label: "Play it safe — grab your tools first", next: "b1_toolup"   }
        ]
      },
      b1_investigate: {
        bg: "foulk_rec",
        chars: ["stefan", "alien"],
        text: "In the rec room, the 'residents' drop the act — glowing eyes, shed disguises, a small craft where the bingo table used to be. Foulk's been a quiet alien hideout. Greg's already halfway to the door.",
        choices: [
          { label: "Try to talk them down",       next: "b1_talk"  },
          { label: "Grab a wrench and get ready",  next: "b1_fight" }
        ]
      },
      b1_toolup: {
        bg: "foulk_rec",
        chars: ["stefan", "greg"],
        text: "You and Greg barricade the rec-room doors and rig something from the maintenance closet — a maintenance man improvises. Through the window, more of them drift the halls, scanning with pale light.",
        choices: [
          { label: "Rig a 'sound cannon' from the PA + your mic", next: "end_1A" },
          { label: "Sneak the real residents out and hide",       next: "end_1D" }
        ]
      },
      b1_talk: {
        bg: "foulk_rec",
        chars: ["stefan", "alien"],
        text: "You raise your hands. 'Okay — nobody's tossing anybody's salad. Talk to me.' The nearest alien tilts its head, curious. It's listening.",
        choices: [
          { label: "Belt out a song to connect",              next: "end_1C" },
          { label: "It's not working — patch the PA and SCREAM", next: "end_1A" }
        ]
      },
      b1_fight: {
        bg: "foulk_rec",
        chars: ["stefan", "greg", "alien"],
        text: "Greg hefts a pipe wrench. 'Two-player mode?' Your gamer brain lights up — you can read their patterns like a boss fight.",
        choices: [
          { label: "Call the combos — 'left! roll! now!'", next: "end_1B" },
          { label: "Too many — fall back to the closet",   next: "end_1D" }
        ]
      },

      /* Branch 1 endings */
      end_1A: {
        bg: "foulk_invaded",
        chars: ["stefan"],
        ending: true,
        text: "ENDING 1A — 'Visions (Live at Foulk).' You cue Visions and unleash a scream so pure it overloads their tech. Windows rattle, systems fry, they retreat. Greg, tearing up: 'Bro... that was the best set you've ever done.'",
        choices: []
      },
      end_1B: {
        bg: "foulk_invaded",
        chars: ["stefan", "greg"],
        ending: true,
        text: "ENDING 1B — 'Co-op Mode.' You call combos on pure instinct, Greg swings the wrench. Teamwork wins. Fist-bump over the wreckage. Greg: 'NOW that's how you toss a salad.'",
        choices: []
      },
      end_1C: {
        bg: "foulk_rec",
        chars: ["stefan", "alien"],
        ending: true,
        text: "ENDING 1C — 'They Just Wanted to Retire.' They weren't invading — they picked Foulk to live out their days in peace, and got spooked. Your kindness (and a mic-drop song) wins them over. They stay on as the home's most interesting residents. It's you and Greg's secret.",
        choices: []
      },
      end_1D: {
        bg: "foulk_break",
        chars: ["stefan", "greg"],
        ending: true,
        text: "ENDING 1D — 'Lived to Tell It.' You and Greg hunker in the supply closet with the real residents, eating cold pizza until it quiets down. You never learn what happened. You clock out shaken and order Nanu's Chicken. Best worst day ever.",
        choices: []
      },

      /* ---------- BRANCH 2: The 106.9 Live Contest ---------- */
      b2_hunt: {
        bg: "livingroom",
        chars: ["stefan", "maria"],
        text: "You call out. Maria's thrilled. You settle in for an Attack on Titan marathon, 106.9 M&S humming in the background. Then the DJ cuts in, LIVE, over an airhorn: 'The 106.9 RIDDLE HUNT starts NOW! First to crack our clues across Wilmington wins the GRAND PRIZE — YOUR band opens for AUGUST BURNS RED!'",
        choices: [ { label: "Wait. Scarpenters. That's winnable.", next: "b2_riddle" } ]
      },
      b2_riddle: {
        bg: "livingroom",
        chars: ["stefan", "maria"],
        text: "The first clue drops: 'Where the keyblade bearer would seek a door, and a straw-hat crew would restock their store.' Penny's ears perk up. Maria grabs a notepad.",
        choices: [
          { label: "Crack it with gamer instinct (the Kingdom Hearts read)", next: "b2_ddr_solo" },
          { label: "Crack it with anime brain (the One Piece read)",         next: "b2_ddr_team" }
        ]
      },
      b2_ddr_solo: {
        bg: "barcade",
        chars: ["stefan"],
        text: "The clue leads to a barcade — and a DDR machine holding the next clue. You crack your knuckles. Hit each arrow with the matching arrow key as it reaches the line.",
        choices: [
          { label: "Step on the pad — go for a flawless run", minigame: { chart: "hard", clear: "end_2A", fail: "end_2C" } },
          { label: "Let Penny take the pad instead",          next: "end_2D" }
        ]
      },
      b2_ddr_team: {
        bg: "barcade",
        chars: ["stefan", "maria"],
        text: "Same barcade, same DDR machine. Maria bumps your shoulder: 'Co-op?' Hit each arrow with the matching arrow key as it reaches the line.",
        choices: [
          { label: "Co-op the dance with Maria",            minigame: { chart: "easy", clear: "end_2B", fail: "end_2C" } },
          { label: "Detour to Nanu's first, wing it later", next: "end_2C" }
        ]
      },

      /* Branch 2 endings */
      end_2A: {
        bg: "stage",
        chars: ["stefan"],
        ending: true,
        text: "ENDING 2A — 'Champions of 106.9.' A flawless run wins it, solo-hero style. Weeks later, Scarpenters is on stage opening for August Burns Red — Maria front row, you screaming Burdened by Weight to a real crowd.",
        choices: []
      },
      end_2B: {
        bg: "stage",
        chars: ["stefan", "maria"],
        ending: true,
        text: "ENDING 2B — 'Two of Us.' You leaned on Maria's smarts and won as a team — a callback to how you met on the music app. Scarpenters gets the gig, together.",
        choices: []
      },
      end_2C: {
        bg: "nanus",
        chars: ["stefan", "maria"],
        ending: true,
        text: "ENDING 2C — 'Second Place, Best Day.' You chased the funniest option all day — Nanu's Chicken, chaos, detours — and lost the prize by a hair. Worth it. Perfect day off.",
        choices: []
      },
      end_2D: {
        bg: "barcade",
        chars: ["stefan", "penny"],
        ending: true,
        text: "ENDING 2D — 'Penny Goes Viral.' Penny's dance-pad stunt blows up so hard that 106.9 crowns THE CAT the winner and makes him station mascot. Scarpenters still gets the gig — per Penny's 'management.'",
        choices: []
      }
    };

    // 2) THE LOGIC: grab the areas we'll be updating, once.
    const gameEl    = document.getElementById("game");
    const bgEl      = document.getElementById("bg");
    const charsEl   = document.getElementById("chars");
    const textEl    = document.getElementById("text");
    const choicesEl = document.getElementById("choices");

    // Typewriter state:
    let typeTimer     = null;
    let isTyping      = false;
    let currentText   = "";
    let currentOnDone = null;

    // 3) DRAW THE ART: paint the background and lay out the character blocks.
    function showArt(scene) {
      bgEl.style.background = BG[scene.bg];
      charsEl.innerHTML = "";
      scene.chars.forEach(function (name) {
        const info = CHAR[name];
        const block = document.createElement("div");
        block.className = "char";
        block.style.background = info.color;
        block.textContent = info.label;
        charsEl.appendChild(block);
      });
    }

    // 4) THE TYPEWRITER.
    function typeText(text, onDone) {
      clearInterval(typeTimer);
      textEl.textContent = "";
      currentText   = text;
      currentOnDone = onDone;
      isTyping      = true;
      let i = 0;
      typeTimer = setInterval(function () {
        textEl.textContent += text[i];
        i++;
        if (i >= text.length) {
          finishTyping();
        }
      }, 28);
    }

    // 5) SKIP / FINISH.
    function finishTyping() {
      if (!isTyping) return;
      clearInterval(typeTimer);
      textEl.textContent = currentText;
      isTyping = false;
      currentOnDone();
    }

    // 6) BUILD THE BUTTONS. Regular choices, plus a "Play again" button on endings.
    function showChoices(scene) {
      choicesEl.innerHTML = "";

      scene.choices.forEach(function (choice) {
        const btn = document.createElement("button");
        btn.className   = "choice";
        btn.textContent = choice.label;
        btn.addEventListener("click", function (ev) {
          ev.stopPropagation();
          if (choice.minigame) {          // this choice launches the DDR minigame...
            startDDR(choice.minigame);    // ...which routes to clear/fail when done
          } else {
            showScene(choice.next);       // ...otherwise just move to the next scene
          }
        });
        choicesEl.appendChild(btn);
      });

      if (scene.ending) {                       // reached an ending?
        const again = document.createElement("button");
        again.className   = "choice restart";
        again.textContent = "\u21BB  Play again";
        again.addEventListener("click", function (ev) {
          ev.stopPropagation();
          showScene("start");                   // jump back to the very beginning
        });
        choicesEl.appendChild(again);
      }
    }

    // 7) THE ENGINE: draw art, type text, then reveal choices.
    function showScene(id) {
      const scene = STORY[id];
      showArt(scene);
      choicesEl.innerHTML = "";
      typeText(scene.text, function () {
        showChoices(scene);
      });
    }

    // 8) CLICK-TO-SKIP.
    gameEl.addEventListener("click", function () {
      if (isTyping) finishTyping();
    });

    /* ================= DDR MINIGAME ================= */

    // Four lanes, in screen order left -> right. Each lane has a screen x, an
    // arrow glyph, a color, and the keys that trigger it.
    const LANES     = ["left", "down", "up", "right"];
    const LANE_X    = { left: 110, down: 250, up: 390, right: 530 };
    const GLYPH     = { left: "\u25C0", down: "\u25BC", up: "\u25B2", right: "\u25B6" };
    const LANE_COL  = { left: "#c98fb0", down: "#8fb06a", up: "#7dc0e0", right: "#d9a24e" };
    const TARGET_Y  = 96;   // the line where arrows should be hit

    // Map keyboard keys -> lane. Arrow keys, plus WASD as a backup.
    const KEY_LANE = {
      ArrowLeft: "left", ArrowDown: "down", ArrowUp: "up", ArrowRight: "right",
      a: "left", s: "down", w: "up", d: "right"
    };

    // Build a note list from a lane pattern: note i happens at start + i*gap ms.
    function makeNotes(pattern, gap, start) {
      return pattern.map(function (lane, i) {
        return { time: start + i * gap, lane: lane };
      });
    }

    // Two charts. `speed` = pixels travelled per millisecond (higher = faster/
    // harder). `perfect`/`good` = timing windows in ms. `clearPct` = fraction of
    // notes you must hit to clear the song.
    const CHARTS = {
      hard: {
        speed: 0.45, perfect: 55, good: 120, clearPct: 0.55,
        notes: makeNotes(
          ["left","down","up","right","up","down","left","right",
           "down","up","right","left","up","up","down","down",
           "left","right","left","right","down","up","left","right"],
          360, 1400)
      },
      easy: {
        speed: 0.30, perfect: 75, good: 165, clearPct: 0.50,
        notes: makeNotes(
          ["down","up","left","right","up","down","left",
           "right","up","down","left","right","down","up"],
          620, 1600)
      }
    };

    const ddrWrap = document.getElementById("ddrWrap");
    const ddrCtx  = document.getElementById("ddrCanvas").getContext("2d");

    let ddr = null;  // holds all state for the active game (null when not playing)

    // START: set up fresh game state, show the overlay, listen for keys, and
    // begin the animation loop.
    function startDDR(cfg) {
      const chart = CHARTS[cfg.chart];
      ddr = {
        cfg: cfg,
        chart: chart,
        // copy each note and add hit/missed flags so we don't mutate the chart
        notes: chart.notes.map(function (n) {
          return { time: n.time, lane: n.lane, hit: false, missed: false };
        }),
        startT: performance.now(),
        score: 0, combo: 0, hits: 0,
        flash: {},          // per-lane timestamp of the last keypress (for glow)
        lastJudge: ""       // "PERFECT" / "GOOD" / "MISS" text to show
      };
      ddrWrap.style.display = "block";
      window.addEventListener("keydown", ddrKey);
      requestAnimationFrame(ddrLoop);
    }

    // KEY: the player pressed a key. Find the closest still-open note in that
    // lane and judge how close the timing was.
    function ddrKey(e) {
      if (!ddr) return;
      const lane = KEY_LANE[e.key] || KEY_LANE[e.key.toLowerCase()];
      if (!lane) return;
      e.preventDefault();                       // stop arrow keys from scrolling

      const t = performance.now() - ddr.startT; // ms since the song started
      ddr.flash[lane] = t;                       // light up this lane's target

      // find the nearest un-judged note in this lane
      let best = null, bestDiff = Infinity;
      ddr.notes.forEach(function (n) {
        if (n.lane !== lane || n.hit || n.missed) return;
        const diff = Math.abs(n.time - t);
        if (diff < bestDiff) { bestDiff = diff; best = n; }
      });

      if (best && bestDiff <= ddr.chart.good) {  // close enough to count as a hit
        best.hit = true;
        ddr.hits++;
        ddr.combo++;
        if (bestDiff <= ddr.chart.perfect) { ddr.score += 100; ddr.lastJudge = "PERFECT"; }
        else                               { ddr.score += 50;  ddr.lastJudge = "GOOD"; }
      } else {                                   // pressed with no note near = whiff
        ddr.combo = 0;
        ddr.lastJudge = "MISS";
      }
    }

    // LOOP: runs ~60x/second. Retire notes that slid past the window as misses,
    // redraw everything, and end the song once the last note is well past.
    function ddrLoop() {
      if (!ddr) return;
      const t = performance.now() - ddr.startT;

      ddr.notes.forEach(function (n) {
        if (!n.hit && !n.missed && t - n.time > ddr.chart.good) {
          n.missed = true;
          ddr.combo = 0;
          ddr.lastJudge = "MISS";
        }
      });

      drawDDR(t);

      const lastTime = ddr.chart.notes[ddr.chart.notes.length - 1].time;
      if (t > lastTime + 900) { endDDR(); return; }
      requestAnimationFrame(ddrLoop);
    }

    // DRAW: paint one frame — title, the four lane targets, the moving arrows,
    // and the HUD (score / combo / hits / last judgment).
    function drawDDR(t) {
      const c = ddrCtx;
      c.fillStyle = "#0b0a12";
      c.fillRect(0, 0, 640, 480);

      c.textAlign = "center";
      c.fillStyle = "#8a74c0";
      c.font = "16px 'Courier New', monospace";
      c.fillText("106.9 DDR  \u2014  hit the arrows on the line!", 320, 34);
      c.fillStyle = "#6a5d83";
      c.font = "13px 'Courier New', monospace";
      c.fillText("use the ARROW KEYS", 320, 56);

      // lane targets (the ring where arrows should land)
      LANES.forEach(function (lane) {
        const x = LANE_X[lane];
        const lit = ddr.flash[lane] && (t - ddr.flash[lane] < 110);
        c.fillStyle = lit ? "#d99a4e" : "#1b1626";
        c.fillRect(x - 42, TARGET_Y - 42, 84, 84);
        c.strokeStyle = "#4a3d63";
        c.lineWidth = 3;
        c.strokeRect(x - 42, TARGET_Y - 42, 84, 84);
        c.fillStyle = "#5a4d73";
        c.font = "38px monospace";
        c.fillText(GLYPH[lane], x, TARGET_Y + 13);
      });

      // moving arrows: an arrow reaches TARGET_Y exactly at its note time
      c.font = "38px monospace";
      ddr.notes.forEach(function (n) {
        if (n.hit) return;
        const x = LANE_X[n.lane];
        const y = TARGET_Y + (n.time - t) * ddr.chart.speed;
        if (y < -50 || y > 520) return;         // off-screen, skip
        c.fillStyle = n.missed ? "#5a3340" : LANE_COL[n.lane];
        c.fillText(GLYPH[n.lane], x, y + 13);
      });

      // HUD
      c.fillStyle = "#f4f1e8";
      c.font = "18px 'Courier New', monospace";
      c.textAlign = "left";
      c.fillText("Score " + ddr.score, 22, 452);
      c.textAlign = "center";
      c.fillText("Combo " + ddr.combo, 320, 452);
      c.textAlign = "right";
      c.fillText(ddr.hits + "/" + ddr.notes.length, 618, 452);

      if (ddr.lastJudge) {
        c.textAlign = "center";
        c.font = "22px 'Courier New', monospace";
        c.fillStyle = ddr.lastJudge === "PERFECT" ? "#7de0a0"
                    : ddr.lastJudge === "GOOD"    ? "#d9c27a"
                    : "#c96a6a";
        c.fillText(ddr.lastJudge, 320, TARGET_Y + 92);
      }
    }

    // END: stop the game, decide clear vs. fail by hit percentage, and route to
    // the matching ending scene.
    function endDDR() {
      window.removeEventListener("keydown", ddrKey);
      ddrWrap.style.display = "none";
      const pct = ddr.hits / ddr.notes.length;
      const cleared = pct >= ddr.chart.clearPct;
      const dest = cleared ? ddr.cfg.clear : ddr.cfg.fail;
      ddr = null;
      showScene(dest);
    }

    /* ================================================ */

    // 9) KICK IT OFF.
    showScene("start");
  </script>
</body>
</html>
