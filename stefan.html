<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>106.9 Presents: Stefan's Big Day</title>

  <style>
    /* ---- CSS: how things LOOK ---- */

    /* The whole page: dark background, and center the game box in the middle. */
    body {
      margin: 0;                 /* remove the browser's default page gap */
      height: 100vh;             /* make body as tall as the screen (100% of viewport height) */
      display: flex;             /* turn body into a flex container so we can center its child */
      align-items: center;       /* center vertically */
      justify-content: center;   /* center horizontally */
      background: #0a0810;        /* near-black backdrop */
      font-family: "Courier New", monospace; /* blocky, retro-feeling text */
    }

    /* The game "screen": a fixed-size window that everything will live inside.
       We keep the INTERNAL size at 640x480 (the whole build assumes those numbers),
       then use transform: scale() to just visually magnify the entire box. */
    #game {
      width: 640px;
      height: 480px;
      background: #141018;        /* dark panel color */
      color: #f4f1e8;            /* off-white text */
      border: 4px solid #000;    /* chunky retro border */
      padding: 20px;             /* breathing room inside the box */
      box-sizing: border-box;    /* count the padding + border INSIDE the 640x480, not on top */
      transform: scale(1.25);    /* zoom the whole screen to 125% (visually ~800x600) */
      transform-origin: center;  /* grow outward from the middle so it stays centered */
    }

    /* The paragraph where a scene's words appear. */
    #text {
      font-size: 18px;           /* comfortable reading size */
      line-height: 1.6;          /* space between lines so it's not cramped */
      min-height: 90px;          /* reserve room so buttons don't jump as text types in */
    }

    /* The container that holds the choice buttons, stacked in a column. */
    #choices {
      margin-top: 24px;          /* gap between the story text and the choices */
      display: flex;
      flex-direction: column;    /* stack buttons vertically instead of side by side */
      gap: 10px;                 /* even spacing between each button */
    }

    /* Each individual choice button. */
    .choice {
      font-family: inherit;      /* use the same monospace font as everything else */
      font-size: 16px;
      text-align: left;          /* text starts at the left edge, like a menu */
      padding: 10px 14px;
      background: #241c30;        /* slightly lighter than the panel so it stands out */
      color: #f4f1e8;
      border: 2px solid #4a3d63;
      cursor: pointer;           /* show a hand pointer so it reads as clickable */
    }

    /* A subtle highlight when the mouse is over a button. */
    .choice:hover {
      background: #3a2f4d;
      border-color: #8a74c0;
    }
  </style>
</head>

<body>
  <!-- ---- HTML: the STRUCTURE ---- -->
  <!-- The game box holds the scene text and a choices area we fill from JS. -->
  <div id="game">
    <p id="text"></p>
    <div id="choices"></div>
  </div>

  <script>
    /* ---- JavaScript: the BEHAVIOR ---- */

    // 1) THE DATA: scenes have `text` plus a `choices` array (label + next id).
    const STORY = {
      start: {
        text: "Sunlight leaks through the blinds. Somewhere nearby, a radio is playing 106.9 M&S. It's going to be a big day.",
        choices: [
          { label: "Get out of bed", next: "kitchen" }
        ]
      },
      kitchen: {
        text: "In the kitchen, Penny the tabby weaves between your ankles, meowing for breakfast. The coffee maker sits ready.",
        choices: [
          { label: "Pour a cup of coffee", next: "coffee" },
          { label: "Feed Penny first",     next: "penny"  }
        ]
      },
      coffee: {
        text: "You pour a cup. The first sip hits just right. Penny glares at you, deeply betrayed.",
        choices: [
          { label: "Okay, okay — feed the cat", next: "penny" }
        ]
      },
      penny: {
        text: "Penny devours his breakfast in about four seconds, then struts off like he owns the place. Big day ahead.",
        choices: []  // a dead end for now — Stage 6 will continue the real story here
      }
    };

    // 2) THE LOGIC: grab the two areas we'll be updating, once.
    const textEl    = document.getElementById("text");
    const choicesEl = document.getElementById("choices");

    // A place to remember the running typewriter timer so we can stop it if the
    // player moves to a new scene before the current text finishes typing.
    let typeTimer = null;

    // 3) THE TYPEWRITER: reveal `text` one character at a time. When the last
    //    character lands, call `onDone` (a function we hand it to run afterward).
    function typeText(text, onDone) {
      clearInterval(typeTimer);   // cancel any reveal still in progress
      textEl.textContent = "";    // start from an empty line
      let i = 0;                  // which character we're up to

      typeTimer = setInterval(function () {   // run this repeatedly, on a timer...
        textEl.textContent += text[i];        // add the next character
        i++;                                  // advance to the following one
        if (i >= text.length) {               // reached the end of the string?
          clearInterval(typeTimer);           // stop the timer
          onDone();                           // ...and run the "after typing" job
        }
      }, 28);                     // 28 milliseconds between characters (typing speed)
    }

    // 4) BUILD THE BUTTONS: given a scene, draw one button per choice.
    function showChoices(scene) {
      choicesEl.innerHTML = "";                 // clear out any buttons from before
      scene.choices.forEach(function (choice) {
        const btn = document.createElement("button");
        btn.className   = "choice";
        btn.textContent = choice.label;
        btn.addEventListener("click", function () {
          showScene(choice.next);
        });
        choicesEl.appendChild(btn);
      });
    }

    // 5) THE ENGINE: show a scene = type its text, THEN reveal its choices.
    function showScene(id) {
      const scene = STORY[id];
      choicesEl.innerHTML = "";                 // hide old choices while new text types
      typeText(scene.text, function () {        // when typing finishes...
        showChoices(scene);                     // ...show this scene's choices
      });
    }

    // 6) KICK IT OFF: start the story at the beginning.
    showScene("start");
  </script>
</body>
</html>
